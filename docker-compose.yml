version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres_laravel
    restart: always
    environment:
      POSTGRES_USER: arya
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: cloud_storage_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: